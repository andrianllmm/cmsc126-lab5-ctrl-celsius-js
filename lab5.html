<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPV Student Records</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="nav-container">
        <a href="#" class="logo">SR</a>
        <nav>
          <ul>
            <li><a href="#add-student">Add Student</a></li>
            <li><a href="#search-student">Search Student</a></li>
            <li><a href="#all-students">All Students</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main -->
    <main>
      <div class="container">
        <!-- Time -->
        <section id="time">
          <button id="show-current-date-btn">Show Current Date</button>
          <p id="current-date-output"></p>
        </section>

        <!-- Add student -->
        <section id="add-student">
          <h2>Add Student</h2>
          <p>
            <strong>Student Number:</strong> <span id="studentNumber"></span>
          </p>

          <div class="form-wrapper">
            <form id="registrationForm" action="" method="post">
              <label for="name">Name:</label><br />
              <input type="text" id="name" name="name" /><br />
              <small id="nameError" class="errorLabel"></small><br />

              <label for="age">Age:</label><br />
              <input type="text" id="age" name="age" /><br />
              <small id="ageError" class="errorLabel"></small><br />

              <label for="email">Email:</label><br />
              <input type="text" id="email" name="email" /><br />
              <small id="emailError" class="errorLabel"></small><br />

              <label>Course:</label><br />
              <input
                type="radio"
                id="course1"
                name="course"
                value="BA Food Appreciation"
              />
              <label for="course1">BA Food Appreciation</label><br />

              <input
                type="radio"
                id="course2"
                name="course"
                value="BA Applied Poetry of the Future"
              />
              <label for="course2">BA Applied Poetry of the Future</label><br />

              <input
                type="radio"
                id="course3"
                name="course"
                value="BS Computer Repair Shop"
              />
              <label for="course3">BS Computer Repair Shop</label><br />

              <input
                type="radio"
                id="course4"
                name="course"
                value="BS Video Gaming"
              />
              <label for="course4">BS Video Gaming</label><br />

              <input
                type="radio"
                id="course5"
                name="course"
                value="BS Installing and Downloading"
              />
              <label for="course5">BS Installing and Downloading</label><br />

              <small id="courseError" class="errorLabel"></small><br />

              <input type="submit" value="Submit" />
            </form>
          </div>
        </section>

        <!-- Search student -->
        <section id="search-student">
          <h2>Search Student</h2>
          <div class="search-bar">
            <input
              type="text"
              id="search-input"
              placeholder="Enter Student ID (2024XXXXX)"
            />
            <button id="search-btn">Search Student</button>
          </div>
          <!-- Result renders here -->
          <div id="search-result"></div>
        </section>

        <!-- All students -->
        <section id="all-students">
          <div class="all-students-header">
            <div class="all-students-title">
              <h2>All Students</h2>
            </div>
            <span class="all-students-count" id="student-count">0</span>
          </div>

          <button class="all-students-btn" id="display-all-btn">
            Display All
          </button>

          <table class="all-students-table" id="students-table">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Course</th>
              </tr>
            </thead>
            <tbody id="students-tbody"></tbody>
          </table>
        </section>
      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 UPV Student Records. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/lab5_scripts.js"></script>
  </body>
</html>
