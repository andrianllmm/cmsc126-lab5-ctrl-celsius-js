<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UPV Student Records</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="nav-container">
        <a href="#" class="logo">SR</a>
        <nav>
          <ul>
            <li><a href="#add-student">Add Student</a></li>
            <li><a href="#search-student">Search Student</a></li>
            <li><a href="#all-students">All Students</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main -->
    <main>
      <div class="container">
        <!-- Time -->
        <section id="time">
          <button id="show-current-date-btn">Show Current Date</button>
          <p id="current-date-output"></p>
        </section>

        <!-- Add student -->
        <section id="add-student">
          <h2>Add Student</h2>
        </section>

        <!-- Search student -->
        <section id="search-student">
          <h2>Search Student</h2>
          <div class="search-bar">
            <input
              type="text"
              id="search-input"
              placeholder="Enter Student ID (e.g. 202448594)"
            />
            <button id="search-btn">Search Student</button>
          </div>
          <!-- Result renders here -->
          <div id="search-result"></div>
        </section>

        <!-- All students -->
        <section id="all-students">
          <div class="all-students_header">
            <div class="all-students_title">
              <h2>All Students</h2>
            </div>
            <span class="all-students_count" id="student-count">0</span>
          </div>

          <button class="all-students_btn" id="display-all-btn">Display All</button>

          <table class="all-students_table" id="students-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Course</th>
              </tr>
            </thead>
            <tbody id="students-tbody"></tbody>
          </table>
        </section>


      </div>
    </main>

    <!-- Footer -->
    <footer>
      <p>&copy; 2026 UPV Student Records. All rights reserved.</p>
    </footer>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
  </body>
</html>
